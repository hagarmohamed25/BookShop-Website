<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
    <form action="{{ url_for('register') }}" method="POST" class="auth-form">
        <div class="info-group">
            <h2 class="text-center mb-3">📚 Register</h2>
            
            <label for="username">Name</label>
            <input type="text" id="username" name="username" placeholder="Enter your name" required>
            
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
            
            <label for="pass">Password</label>
            <input type="password" id="pass" name="password" placeholder="Enter your password" required>
            <div id="pass_error" style="display:none; color:#dc3545; font-size:13px; margin-top:3px;">Your password should be more than 6 digits!</div>
            
            <label for="conf_pass">Confirm Password</label>
            <input type="password" id="conf_pass" name="confirm_password" placeholder="Confirm your password" required>
            <div id="conf_error" style="display:none; color:#dc3545; font-size:13px; margin-top:3px;">Passwords do not match!</div>
            
            {% if error %}
                <p class="error-msg">{{ error }}</p>
            {% endif %}
            
            <button type="submit">Register</button>
            <p>Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
        </div>
    </form>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
